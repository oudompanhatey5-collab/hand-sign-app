<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Assist App</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #7c3aed;
            --danger: #dc2626;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Khmer OS Battambang', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: var(--primary); margin-bottom: 5px; }
        p { color: #64748b; font-size: 14px; }

        /* ប្រអប់បង្ហាញអក្សរសម្រាប់អ្នកថ្លង់ */
        #display-area {
            width: 100%;
            min-height: 200px;
            background: #f1f5f9;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            font-size: 24px; /* អក្សរធំសម្រាប់ងាយមើល */
            line-height: 1.5;
            color: #1e293b;
            text-align: left;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 15px;
            font-size: 16px;
            font-family: 'Khmer OS Battambang';
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        /* ប៊ូតុងសម្រាប់អ្នកថ្លង់ */
        .btn-hear { background-color: var(--primary); }
        /* ប៊ូតុងសម្រាប់អ្នកពិការភ្នែក */
        .btn-speak { background-color: var(--secondary); }
        
        .btn-stop { 
            background-color: var(--danger); 
            grid-column: span 2; 
            margin-top: 10px;
        }

        button:active { transform: scale(0.98); }

        .active-ring {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ជំនួយការពិការភាពចម្រុះ</h2>
    <p>ជួយដល់អ្នកគថ្លង់ និងអ្នកពិការភ្នែក</p>

    <div id="display-area" id="text-to-read">សូមចុចប៊ូតុងខាងក្រោម...</div>

    <div class="btn-grid">
        <button class="btn-hear" id="listen-btn">
            <span>🎤 ស្ដាប់សំឡេង</span>
            <small>(ប្តូរទៅជាអក្សរ)</small>
        </button>

        <button class="btn-speak" id="read-btn">
            <span>🔊 អានអត្ថបទ</span>
            <small>(ប្តូរទៅជាសំឡេង)</small>
        </button>

        <button class="btn-stop" id="stop-btn">បញ្ឈប់ទាំងអស់</button>
    </div>
</div>

<script>
    const display = document.getElementById('display-area');
    const listenBtn = document.getElementById('listen-btn');
    const readBtn = document.getElementById('read-btn');
    const stopBtn = document.getElementById('stop-btn');

    // 1. បច្ចេកវិទ្យា Speech to Text (សម្រាប់អ្នកថ្លង់)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'km-KH';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
            let text = "";
            for (let i = 0; i < event.results.length; i++) {
                text += event.results[i][0].transcript;
            }
            display.innerText = text;
        };

        recognition.onend = () => {
            // បើវាដាច់ដោយខ្លួនឯង ឱ្យវាចាប់ផ្តើមឡើងវិញ (ដោះស្រាយបញ្ហាដែលអ្នកជួប)
            if(listenBtn.classList.contains('active-ring')) {
                recognition.start();
            }
        };
    }

    listenBtn.onclick = () => {
        if (recognition) {
            recognition.start();
            listenBtn.classList.add('active-ring');
            display.innerText = "កំពុងស្តាប់... សូមនិយាយភាសាខ្មែរ";
        }
    };

    // 2. បច្ចេកវិទ្យា Text to Speech (សម្រាប់អ្នកពិការភ្នែក)
    readBtn.onclick = () => {
        const textToRead = display.innerText;
        const utterance = new SpeechSynthesisUtterance(textToRead);
        utterance.lang = 'km-KH'; // ចំណាំ៖ Browser ខ្លះមិនទាន់មានសំឡេងខ្មែរឡើយ វានឹងប្រើសំឡេងលំនាំដើម
        window.speechSynthesis.speak(utterance);
        readBtn.classList.add('active-ring');
        
        utterance.onend = () => readBtn.classList.remove('active-ring');
    };

    // 3. ប៊ូតុងបញ្ឈប់
    stopBtn.onclick = () => {
        if (recognition) recognition.stop();
        window.speechSynthesis.cancel();
        listenBtn.classList.remove('active-ring');
        readBtn.classList.remove('active-ring');
        display.innerText = "បានបញ្ឈប់។";
    };
</script>

</body>
</html>
