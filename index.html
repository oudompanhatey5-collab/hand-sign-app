<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ជំនួយការជនពិការ និងអ្នកគថ្លង់</title>
    
    <style>
        /* ផ្នែករចនា (CSS) */
        body {
            font-family: 'Khmer OS Battambang', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 20px;
        }

        #status {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        #result-box {
            width: 100%;
            min-height: 150px;
            border: 2px dashed #3498db;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
            text-align: left;
            font-size: 18px;
            line-height: 1.6;
            color: #34495e;
            box-sizing: border-box;
            word-wrap: break-word;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Khmer OS Battambang';
        }

        .btn-start {
            background-color: #27ae60;
            color: white;
        }

        .btn-start:hover {
            background-color: #219150;
        }

        .btn-stop {
            background-color: #e74c3c;
            color: white;
        }

        .btn-stop:hover {
            background-color: #c0392b;
        }

        /* សម្រាប់ឱ្យអក្សរលោតញាក់ពេលកំពុងស្តាប់ */
        .recording {
            color: #e74c3c;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>ជំនួយការបកប្រែសំឡេង (Speech-to-Text)</h1>
        
        <p id="status">ត្រៀមខ្លួនរួចរាល់</p>
        
        <div id="result-box" placeholder="អត្ថបទដែលនិយាយនឹងបង្ហាញនៅទីនេះ...">
            សូមចុចប៊ូតុងខាងក្រោមដើម្បីនិយាយ...
        </div>

        <div class="button-group">
            <button class="btn-start" onclick="startConverting()">ចាប់ផ្តើមស្តាប់</button>
            <button class="btn-stop" onclick="stopConverting()">បញ្ឈប់</button>
        </div>
    </div>

    <script>
        /* ផ្នែកបញ្ជា (JavaScript) */
        var r = document.getElementById('result-box');
        var s = document.getElementById('status');
        
        // ឆែកមើលថាតើ Browser គាំទ្រដែរឬទេ
        var speechRecognizer = window.webkitSpeechRecognition || window.speechRecognition;

        if (typeof speechRecognizer !== 'undefined') {
            var recognition = new speechRecognizer();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'km-KH'; // កំណត់យកភាសាខ្មែរ

            function startConverting() {
                recognition.start();
                s.innerHTML = "ស្ថានភាព៖ <span class='recording'>កំពុងស្តាប់...</span>";
                r.innerHTML = "";
            }

            function stopConverting() {
                recognition.stop();
                s.innerHTML = "ស្ថានភាព៖ បានបញ្ឈប់";
                s.style.color = "#7f8c8d";
            }

            recognition.onresult = function(event) {
                var interimTranscript = '';
                for (var i = event.resultIndex; i < event.results.length; i++) {
                    var transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        r.innerHTML += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }
                // បង្ហាញអត្ថបទបណ្តោះអាសន្នពេលកំពុងនិយាយ
                if (interimTranscript !== "") {
                    r.innerHTML = interimTranscript;
                }
            };

            recognition.onerror = function(event) {
                s.innerHTML = "មានបញ្ហា៖ " + event.error;
            };
        } else {
            r.innerHTML = "សូមទោស! កម្មវិធីរុករក (Browser) របស់អ្នកមិនគាំទ្រមុខងារនេះទេ។ សូមប្រើ Google Chrome។";
        }
    </script>

</body>
</html>
